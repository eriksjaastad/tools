name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  claude-review:
    uses: ./.github/workflows/claude-review-reusable.yml
    with:
      test_command: |
        if uv run -m pytest --collect-only -q 2>/dev/null | grep -q "test"; then
          uv run -m pytest --tb=short -q
        else
          echo "No tests found, skipping"
        fi
      review_style: governance
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_GITHUB_API_KEY }}
