name: "PR: Require Type Label"

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

permissions:
  pull-requests: read

jobs:
  check-label:
    runs-on: ubuntu-latest
    steps:
      - name: Check for type label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          TYPES="feature enhancement bug chore refactor docs test hotfix security perf"
          for type in $TYPES; do
            if echo "$LABELS" | grep -qx "$type"; then
              echo "Found type label: $type"
              exit 0
            fi
          done
          echo "Missing type label on PR #${PR_NUMBER}"
          echo "Every PR must have one of: feature, enhancement, bug, chore, refactor, docs, test, hotfix, security, perf"
          echo "Add one with: gh pr edit $PR_NUMBER --add-label feature"
          exit 1
